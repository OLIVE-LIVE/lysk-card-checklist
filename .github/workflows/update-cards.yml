name: Update LYSK cards

on:
  workflow_dispatch:
  schedule:
    - cron: "20 19 * * *"

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update card data
        run: node scripts/update-cards.mjs

      - name: Commit updated cards
        run: |
          if git diff --quiet -- cards.js; then
            echo "No card changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards.js
          git commit -m "Update LYSK card data"
          git push
